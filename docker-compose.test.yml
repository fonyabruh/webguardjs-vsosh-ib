version: '3.9'

services:
  db-test:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_TEST_USER:-webguard_test}
      POSTGRES_PASSWORD: ${POSTGRES_TEST_PASSWORD:-webguard_test}
      POSTGRES_DB: ${POSTGRES_TEST_DB:-webguard_test}
    ports:
      - '${POSTGRES_TEST_PORT:-55432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_TEST_USER:-webguard_test} -d ${POSTGRES_TEST_DB:-webguard_test}']
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  server-test:
    build:
      context: .
      dockerfile: Dockerfile.server
    environment:
      PORT: ${TEST_SERVER_PORT:-3300}
      API_KEY: ${API_KEY:-changeme}
      DATABASE_URL: postgres://${POSTGRES_TEST_USER:-webguard_test}:${POSTGRES_TEST_PASSWORD:-webguard_test}@db-test:5432/${POSTGRES_TEST_DB:-webguard_test}
      WEBGUARD_ENFORCE: ${WEBGUARD_ENFORCE:-0}
      WEBGUARD_DEBUG: ${WEBGUARD_DEBUG:-1}
    depends_on:
      db-test:
        condition: service_healthy
    ports:
      - '${TEST_SERVER_PORT:-3300}:${TEST_SERVER_PORT:-3300}'
